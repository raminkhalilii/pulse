worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Rate limiting (basic DDoS protection) ─────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── Upstream targets (internal Docker network only) ───────────────────────
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (all domains) ───────────────────────────────────
    server {
        listen 80;
        server_name pulsee.website www.pulsee.website;

        # Required for Certbot HTTP-01 challenge renewal (all subdomains)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: main app (pulsee.website) ──────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name pulsee.website www.pulsee.website;

        ssl_certificate     /etc/letsencrypt/live/pulsee.website/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pulsee.website/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        # ── NestJS REST API ────────────────────────────────────────────────────
        location /api {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries   3;
            proxy_next_upstream_timeout 15s;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Health endpoint ────────────────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            access_log off;
        }

        # ── Socket.IO WebSocket upgrade ────────────────────────────────────────
        location /socket.io {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Next.js frontend (catch-all) ───────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries   3;
            proxy_next_upstream_timeout 15s;
        }
    }

}
