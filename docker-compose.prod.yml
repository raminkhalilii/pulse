name: pulse-prod

# ─── Infrastructure ────────────────────────────────────────────────────────────
# Postgres and Redis have NO port bindings — they are reachable only within
# the pulse_net bridge network. No traffic from the public internet can reach them.

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No ports: block — intentionally hidden from host/internet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulse_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # No ports: block — intentionally hidden from host/internet
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - pulse_net

# ─── Analytics (Matomo) ────────────────────────────────────────────────────────
# Matomo requires MySQL/MariaDB — it cannot share the Postgres instance.
# matomo-db has NO port binding: only Matomo can reach it via pulse_net.

  matomo-db:
    image: mariadb:11-lts
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MATOMO_DB_NAME:-matomo}
      MYSQL_USER: ${MATOMO_DB_USER:-matomo}
      MYSQL_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - matomo_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulse_net

  matomo:
    image: matomo:5-apache
    restart: always
    depends_on:
      matomo-db:
        condition: service_healthy
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_DBNAME: ${MATOMO_DB_NAME:-matomo}
      MATOMO_DATABASE_USERNAME: ${MATOMO_DB_USER:-matomo}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      # Persists Matomo config, plugins, and uploaded assets across container restarts.
      # config/config.ini.php (written by the web installer) lives here.
      - matomo_data:/var/www/html
    # No ports: block — Nginx is the only public ingress
    networks:
      - pulse_net

# ─── Application Services ──────────────────────────────────────────────────────

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # ── Zero-downtime: health gate ──────────────────────────────────────────────
    # Docker marks the container healthy only after this probe passes.
    # Nginx's depends_on condition:service_healthy means it waits for this.
    # The deploy script uses --wait which blocks until healthy before returning.
    #
    # Uses Node.js built-in HTTP — no curl/wget needed in the Alpine image.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s      # check every 10s once start_period has elapsed
      timeout: 5s        # probe must respond within 5s or it counts as a failure
      retries: 3         # 3 consecutive failures → container marked unhealthy
      start_period: 30s  # give NestJS + Prisma migrations time to start up

    # ── Zero-downtime: graceful stop ────────────────────────────────────────────
    # Docker sends SIGTERM and waits this long before sending SIGKILL.
    # NestJS enableShutdownHooks() uses this window to drain in-flight requests.
    # Default Docker timeout is only 10s — not enough for long DB migrations.
    stop_grace_period: 30s

    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
    # Migrations run once at startup, then the API server starts
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"
    # No ports: block — NGINX is the only public ingress
    networks:
      - pulse_net

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Workers process BullMQ jobs — give them time to finish the current job
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    command: ["node", "dist/src/worker/worker.main.js"]
    networks:
      - pulse_net

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_API_URL: https://${DOMAIN}
    networks:
      - pulse_net

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - pulse_net

# ─── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  matomo_db_data:   # MariaDB data — survives container restarts and image upgrades
  matomo_data:      # Matomo web root — config, plugins, uploaded assets

networks:
  pulse_net:
    driver: bridge
