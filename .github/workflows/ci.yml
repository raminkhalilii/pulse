name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-pulse

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: backend-pulse/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Run ESLint without --fix so lint errors actually fail the pipeline.
      # --max-warnings=0 treats warnings as errors too.
      - name: Run ESLint
        run: npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings=50

  # ── 2. Test ───────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-pulse

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: backend-pulse/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test

  # ── 3. Build & Push Images ─────────────────────────────────────────────────
  build:
    name: Build & Push (Docker)
    needs: test
    runs-on: ubuntu-latest
    # Only push images on merges to main, not on PRs (no secrets available on forks)
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) — backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-pulse
          file: ./backend-pulse/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }},ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build (and push on main) — frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-pulse
          file: ./frontend-pulse/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }},ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            BACKEND_URL=http://backend:3000
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy ──────────────────────────────────────────────────────────────
  # Only runs on push to main AND only if build succeeded.
  # Uses SSH to connect to the VPS and execute the deploy script.
  #
  # Required GitHub Secrets:
  #   VPS_HOST        — IP address or hostname of the VPS
  #   VPS_USER        — SSH user (e.g. "deploy" or "ubuntu")
  #   VPS_SSH_KEY     — PEM-encoded private key for SSH access
  #   DOMAIN          — Your domain (e.g. "pulsee.website")
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ── Step 1: Run the health-gated deploy script on the server ─────────────
      # The script uses `docker compose up --wait` which BLOCKS until the new
      # container's healthcheck passes. If it never passes, the script exits
      # non-zero and this step fails — preventing a broken deploy from being
      # silently marked as successful.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # command_timeout must exceed the worst-case deploy time:
          # 30s start_period + 3 × 10s healthcheck interval + buffer = ~90s
          command_timeout: 120m
          script: |
            bash /home/ec2-user/Pulse/scripts/deploy.sh ${{ github.sha }}

      # ── Step 2: External verification from GitHub Actions runner ─────────────
      # Confirms the /health endpoint is publicly reachable through Nginx + TLS.
      # Runs from OUTSIDE the server — if Nginx is misconfigured this will catch it.
      - name: Verify deployment (external health check)
        run: |
          echo "Waiting 5s for Nginx to finish reloading..."
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            https://${{ secrets.DOMAIN }}/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "✗ External health check failed — got HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✓ External health check passed (HTTP $HTTP_CODE)"

      # ── Step 3: Notify on failure (add your alert channel here) ──────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy to production FAILED for commit ${{ github.sha }}"
          echo "Check the deploy logs above for details."
          # Extend this step to POST to Slack/Discord/PagerDuty if desired.
